<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <meta name="author" content="Evelyn Howell">
    <meta name="description" content="A collection of delicious recipes to try at home.">
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">



    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
                    
    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
</head>
<body>
    <header>
        <div class = "header-content">
            <img src="images/recipe-book.png" alt="Recipe book logo" class="logo">
            <h1>RecipeBook</h1>
        </div>
        <form> 
            <input type="search" placeholder="Search..." name="search" id="search-bar"> <button type="submit"><img style="width: 100%; height: auto;" src="images/search.svg" alt="Search icon"></button>
        </form>
        <hr>
    </header>
    <main>
        <div id = "recipe-container">
            
        </div>    
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="instagram-icon.png"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="youtube-icon.png"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="pinterest-icon.png"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                  
    </footer>
    
</body>
</html>
