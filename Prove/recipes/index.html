<body>
    <header>
        <img src="logo.jpg" alt="Recipe logo" class="logo">
        <form> <input type="search" placeholder="Search..." name="search" id="search-bar"> <button type="submit">Search</button>
        </form>
    </header>
    <main>
        <img src="apple_crisp.jpg" alt="Apple Crisp" class="recipe-image">
        <div class="recipe-details">
            <button class="discription" aria-label="description">dessert</button>
            <h1 class="recipe-title">Apple Crisp</h1>
        
            <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
            >
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
        

            <p>An apple crisp is a warm, comforting dessert made with cinnamon‑spiced apples baked under a buttery oat topping. As it cooks, the apples turn soft and sweet while the topping becomes golden and crunchy, creating a cozy treat that’s perfect with a scoop of vanilla ice cream.</p>
        </div>
